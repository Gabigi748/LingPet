<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LingPet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    }

    #pet-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      position: relative;
    }

    /* Pet image */
    #pet-img {
      max-width: 280px;
      max-height: 300px;
      object-fit: contain;
      cursor: pointer;
      transition: transform 0.3s ease;
      flex-shrink: 0;
      z-index: 1;
    }
    #pet-img:hover { transform: scale(1.03); }
    #pet-img.emotion-change {
      animation: emotionBounce 0.4s ease;
    }
    @keyframes emotionBounce {
      0% { transform: scale(1); }
      30% { transform: scale(0.9); }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    /* ========== Galgame Dialog Box ========== */
    #dialog-box {
      display: none;
      width: 100%;
      background: linear-gradient(180deg, rgba(10,10,30,0.85) 0%, rgba(20,20,50,0.92) 100%);
      border-top: 2px solid rgba(180,160,255,0.4);
      border-radius: 12px 12px 0 0;
      padding: 0;
      z-index: 10;
      flex-shrink: 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
    }
    #dialog-box.show { display: block; }

    /* Header: name + buttons */
    #dialog-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px 2px;
    }
    #dialog-name {
      font-size: 14px;
      font-weight: bold;
      color: #e0d0ff;
      text-shadow: 0 0 8px rgba(180,160,255,0.5);
      letter-spacing: 1px;
    }
    #dialog-buttons {
      display: flex;
      gap: 4px;
    }
    #dialog-buttons button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #ccc;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
      transition: all 0.2s;
    }
    #dialog-buttons button:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    /* Dialog text area */
    #dialog-text {
      min-height: 48px;
      max-height: 80px;
      padding: 6px 14px 8px;
      color: #f0f0f0;
      font-size: 14px;
      line-height: 1.6;
      overflow-y: auto;
      word-wrap: break-word;
    }
    #dialog-text::-webkit-scrollbar { width: 3px; }
    #dialog-text::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    #dialog-text .typing-cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: #e0d0ff;
      margin-left: 2px;
      animation: blink 0.8s infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Input row */
    #dialog-input-row {
      display: flex;
      align-items: center;
      padding: 4px 10px 10px;
      gap: 6px;
    }
    #msg-input {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 7px 14px;
      font-size: 13px;
      color: #f0f0f0;
      outline: none;
      -webkit-app-region: no-drag;
      font-family: inherit;
    }
    #msg-input::placeholder { color: rgba(255,255,255,0.3); }
    #msg-input:focus { border-color: rgba(180,160,255,0.6); }
    #send-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 50%;
      background: rgba(180,160,255,0.3);
      color: #e0d0ff;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
      transition: all 0.2s;
    }
    #send-btn:hover { background: rgba(180,160,255,0.5); }

    /* ========== History Overlay ========== */
    #history-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(5,5,20,0.92);
      z-index: 50;
      flex-direction: column;
      overflow: hidden;
      border-radius: 12px;
    }
    #history-overlay.show { display: flex; }

    #history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    #history-header span {
      color: #e0d0ff;
      font-size: 14px;
      font-weight: bold;
    }
    #history-close {
      background: none;
      border: none;
      color: #aaa;
      font-size: 18px;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    #history-close:hover { color: #fff; }

    #history-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
    }
    #history-messages::-webkit-scrollbar { width: 3px; }
    #history-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    .history-msg {
      margin-bottom: 10px;
    }
    .history-msg .h-name {
      font-size: 11px;
      color: #b0a0d0;
      margin-bottom: 2px;
    }
    .history-msg .h-text {
      font-size: 13px;
      color: #ddd;
      line-height: 1.5;
      padding: 6px 10px;
      border-radius: 8px;
    }
    .history-msg.user .h-text {
      background: rgba(100,140,255,0.15);
      text-align: right;
    }
    .history-msg.bot .h-text {
      background: rgba(180,160,255,0.12);
    }

    /* ========== Settings Panel ========== */
    #settings-panel {
      display: none;
      position: absolute;
      top: 10px; left: 10px; right: 10px; bottom: 10px;
      background: rgba(255,255,255,0.97);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 100;
      flex-direction: column;
      overflow: hidden;
    }
    #settings-panel.show { display: flex; }
    .settings-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      font-weight: bold; font-size: 14px; color: #333;
      -webkit-app-region: no-drag;
    }
    .settings-header button {
      background: none; border: none; font-size: 18px; cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .settings-body {
      padding: 12px 16px; overflow-y: auto; flex: 1;
      display: flex; flex-direction: column; gap: 6px;
      -webkit-app-region: no-drag;
    }
    .settings-body label { font-size: 12px; color: #666; margin-top: 4px; }
    .settings-body input, .settings-body textarea {
      border: 1px solid #ddd; border-radius: 8px;
      padding: 8px 10px; font-size: 13px; outline: none;
      font-family: inherit;
    }
    .settings-body input:focus, .settings-body textarea:focus { border-color: #b0a0d0; }
    #settings-save {
      margin-top: 8px; padding: 10px;
      background: #b0a0d0; color: white; border: none;
      border-radius: 10px; font-size: 14px; cursor: pointer;
    }
    #settings-save:hover { background: #9080c0; }

    .settings-divider { height: 1px; background: #eee; margin: 8px 0; }
    #emotion-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px; margin-bottom: 8px;
    }
    .emotion-item {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 8px; background: #f9f9f9;
      border-radius: 8px; font-size: 12px;
    }
    .emotion-item img {
      width: 32px; height: 32px; object-fit: contain;
      border-radius: 4px; background: #eee;
    }
    .emotion-item .no-img {
      width: 32px; height: 32px; display: flex;
      align-items: center; justify-content: center;
      background: #eee; border-radius: 4px;
      font-size: 10px; color: #bbb;
    }
  </style>
</head>
<body>
  <div id="pet-container">
    <!-- History overlay -->
    <div id="history-overlay">
      <div id="history-header">
        <span>History</span>
        <button id="history-close">&#x2715;</button>
      </div>
      <div id="history-messages"></div>
    </div>

    <img id="pet-img" src="assets/default.png" alt="Pet" />

    <!-- Galgame dialog box -->
    <div id="dialog-box">
      <div id="dialog-header">
        <span id="dialog-name"></span>
        <div id="dialog-buttons">
          <button id="history-btn" title="History">&#x1F4DC;</button>
        </div>
      </div>
      <div id="dialog-text">Click to start chatting...</div>
      <div id="dialog-input-row">
        <input id="msg-input" type="text" placeholder="Type here..." />
        <button id="send-btn">&#x27A4;</button>
      </div>
    </div>

    <!-- Settings Panel -->
    <div id="settings-panel">
      <div class="settings-header">
        <span>Settings</span>
        <button id="settings-close">&#x2715;</button>
      </div>
      <div class="settings-body">
        <label>API Base URL</label>
        <input id="cfg-url" type="text" placeholder="http://localhost:3000" />
        <label>API Endpoint</label>
        <input id="cfg-endpoint" type="text" placeholder="/v1/chat/completions" />
        <label>API Key (leave empty for gateway)</label>
        <input id="cfg-key" type="password" placeholder="your-api-key" />
        <label>Model</label>
        <input id="cfg-model" type="text" placeholder="model-name" />
        <label>User (for OpenClaw gateway session)</label>
        <input id="cfg-user" type="text" placeholder="e.g. my-pet" />
        <label>Pet Name</label>
        <input id="cfg-name" type="text" placeholder="My Pet" />
        <label>System Prompt</label>
        <textarea id="cfg-prompt" rows="3" placeholder="Describe your pet's personality..."></textarea>
        <label>Voice Language</label>
        <input id="cfg-lang" type="text" placeholder="zh-TW" />
        <div class="settings-divider"></div>
        <label style="font-weight:bold;font-size:13px;">Emotion Artwork</label>
        <p style="font-size:11px;color:#999;margin:2px 0 6px;">
          Place images in <code>assets/</code> folder named by emotion:<br>
          happy.png, sad.png, angry.png, shy.png, surprised.png, thinking.png, sleepy.png, neutral.png
        </p>
        <div id="emotion-grid"></div>
        <button id="settings-save">Save</button>
      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
